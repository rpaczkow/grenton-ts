statistic_state=Enged\u00E9lyezi az m\u00E9r\u00E9si jelent\u00E9sek k\u00FCld\u00E9s\u00E9t a statisztikai modulnak, \u00E9s meghat\u00E1rozza a m\u00E9r\u00E9si kateg\u00F3ri\u00E1t.\n\nFigyelem!\nMiut\u00E1n egy statisztika elk\u00FCld\u00E9sre ker\u00FClt, az a szerveren t\u00E1rol\u00F3dik a statisztik\u00E1k t\u00F6rt\u00E9net\u00E9ben.\nA statisztik\u00E1k manu\u00E1lisan elt\u00E1vol\u00EDthat\u00F3k a felh\u0151szolg\u00E1ltat\u00E1s fi\u00F3kj\u00E1nak vez\u00E9rl\u0151pultj\u00E1n.\n\nOff - A statisztik\u00E1k nem ker\u00FClnek k\u00FCld\u00E9sre a felh\u0151be.
