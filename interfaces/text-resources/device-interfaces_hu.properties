statistic_type_media_pulse=A statisztik\u00E1k az impulzusok sz\u00E1mol\u00E1sa alapj\u00E1n ker\u00FClnek k\u00FCld\u00E9sre a TriggerPulse m\u00F3dszerrel, \u00E9s az impulzusra vonatkoz\u00F3an megadott watt vagy m\u00B3 \u00E9rt\u00E9k alapj\u00E1n. A Value \u00E9rt\u00E9k az aktu\u00E1lis \u00E9rt\u00E9ket \u00E1br\u00E1zolja, amit a szerverre kell k\u00FCldeni.
statistic_type_sensor=A statisztik\u00E1k a Value tulajdons\u00E1g be\u00E1ll\u00EDtott \u00E9rt\u00E9ke alapj\u00E1n sz\u00E1m\u00EDtott \u00E1tlagos \u00E9rt\u00E9kek alapj\u00E1n ker\u00FClnek k\u00FCld\u00E9sre 15 perces id\u0151szakokban.
statistic_type_grid=Az energia m\u00E9r\u00E9s\u00E9hez a statisztik\u00E1k a Value tulajdons\u00E1g \u00E9rt\u00E9k\u00E9nek k\u00FCl\u00F6nbs\u00E9ge alapj\u00E1n ker\u00FClnek k\u00FCld\u00E9sre 15 perces id\u0151szakokban. A Value tulajdons\u00E1got friss\u00EDteni kell a teljes energia\u00E9rt\u00E9kkel watt\u00F3r\u00E1kban. M\u00E1s m\u00E9r\u00E9si t\u00EDpusok eset\u00E9n az \u00E1tlagos \u00E9rt\u00E9ket sz\u00E1m\u00EDtj\u00E1k 15 perces id\u0151szakokban.
statistic_type_energyproduction=Az energia m\u00E9r\u00E9s\u00E9hez a statisztik\u00E1k a Value tulajdons\u00E1g \u00E9rt\u00E9k\u00E9nek k\u00FCl\u00F6nbs\u00E9ge alapj\u00E1n ker\u00FClnek k\u00FCld\u00E9sre 15 perces id\u0151szakokban. A Value tulajdons\u00E1got friss\u00EDteni kell a teljes energia\u00E9rt\u00E9kkel watt\u00F3r\u00E1kban. M\u00E1s m\u00E9r\u00E9si t\u00EDpusok eset\u00E9n az \u00E1tlagos \u00E9rt\u00E9ket sz\u00E1m\u00EDtj\u00E1k 15 perces id\u0151szakokban.
statistic_type_energystorage=A t\u00F6lt\u00E9si \u00E1llapot m\u00E9r\u00E9s\u00E9hez az \u00E1tlagos \u00E9rt\u00E9keket sz\u00E1molj\u00E1k 15 perces id\u0151szakokban. Az energia t\u00F6lt\u00E9se \u00E9s kis\u00FCt\u00E9se eset\u00E9n a statisztik\u00E1k a Value tulajdons\u00E1g \u00E9rt\u00E9k\u00E9nek k\u00FCl\u00F6nbs\u00E9ge alapj\u00E1n ker\u00FClnek k\u00FCld\u00E9sre 15 perces id\u0151szakokban. A Value tulajdons\u00E1got friss\u00EDteni kell a teljes energia\u00E9rt\u00E9kkel watt\u00F3r\u00E1kban.
statistic_type_charger=Az energia m\u00E9r\u00E9s\u00E9hez a statisztik\u00E1k a Value tulajdons\u00E1g \u00E9rt\u00E9k\u00E9nek k\u00FCl\u00F6nbs\u00E9ge alapj\u00E1n ker\u00FClnek k\u00FCld\u00E9sre 15 perces id\u0151szakokban. A Value tulajdons\u00E1got friss\u00EDteni kell a jelenlegi t\u00F6lt\u00E9si munkamenet teljes energia\u00E9rt\u00E9k\u00E9vel watt\u00F3r\u00E1kban. M\u00E1s m\u00E9r\u00E9si t\u00EDpusok eset\u00E9n az \u00E1tlagos \u00E9rt\u00E9ket sz\u00E1m\u00EDtj\u00E1k 15 perces id\u0151szakokban.
statistic_type_other=Az \u00E1tlagos \u00E9rt\u00E9k m\u00E9r\u00E9s\u00E9hez az \u00E1tlagos \u00E9rt\u00E9ket sz\u00E1molj\u00E1k 15 perces id\u0151szakokban. Az impulzusok sz\u00E1ml\u00E1l\u00F3j\u00E1n\u00E1l a statisztik\u00E1k a TriggerPulse m\u00F3dszerrel sz\u00E1molt impulzusok alapj\u00E1n ker\u00FClnek k\u00FCld\u00E9sre, ebben az esetben a Value \u00E9rt\u00E9k az aktu\u00E1lis \u00E9rt\u00E9ket jelenti, amit a szerverre kell k\u00FCldeni.
