statistic_state_enum_other=Other (Average value)
statistic_state_enum_other_counter=Other (Counter)
statistic_type_media_pulse=Statystyki s\u0105 wysy\u0142ane na podstawie zliczania impuls\u00F3w za pomoc\u0105 metody TriggerPulse, oraz zadeklarowanej warto\u015Bci dla jednego impulsu wyra\u017Conej w watach lub m\u00B3. Warto\u015B\u0107 Value przedtsaiwa aktualn\u0105 warto\u015B\u0107 do wys\u0142ania na serwer.
statistic_type_sensor=Statystyki s\u0105 wysy\u0142ane na podstawie obliczenia warto\u015Bci \u015Bredniej dla ustawionej warto\u015Bci cechy Value w okresie 15 minut.
statistic_type_grid=Dla pomiaru energii statystyki s\u0105 wysy\u0142ane na podstawie zliczania r\u00F3\u017Cnicy w warto\u015Bci cechy Value w okresie 15 minut. Cech\u0119 Value nale\u017Cy aktualizowa\u0107 o ca\u0142kowit\u0105 warto\u015B\u0107 energii w watogodzinach. Dla pozosta\u0142ych typ\u00F3w pomiaru zliczana jest warto\u015B\u0107 \u015Brednia w okresie 15 minut.
statistic_type_energyproduction=Dla pomiaru energii statystyki s\u0105 wysy\u0142ane na podstawie zliczania r\u00F3\u017Cnicy w warto\u015Bci cechy Value w okresie 15 minut. Cech\u0119 Value nale\u017Cy aktualizowa\u0107 o ca\u0142kowit\u0105 warto\u015B\u0107 energii w watogodzinach. Dla pozosta\u0142ych typ\u00F3w pomiaru zliczana jest warto\u015B\u0107 \u015Brednia w okresie 15 minut.
statistic_type_energystorage=Dla pomiaru poziomu na\u0142adowania zliczana jest warto\u015B\u0107 \u015Brednia w okresie 15 minut. Dla pomiaru energii \u0142adowania i roz\u0142adowywania statystyki s\u0105 wysy\u0142ane na podstawie zliczania r\u00F3\u017Cnicy w warto\u015Bci cechy Value w okresie 15 minut. Cech\u0119 Value nale\u017Cy aktualizowa\u0107 o ca\u0142kowit\u0105 warto\u015B\u0107 energii w watogodzinach.
statistic_type_charger=Dla pomiaru energii statystyki s\u0105 wysy\u0142ane na podstawie zliczania r\u00F3\u017Cnicy w warto\u015Bci cechy Value w okresie 15 minut. Cech\u0119 Value nale\u017Cy aktualizowa\u0107 o ca\u0142kowit\u0105 warto\u015B\u0107 energii bie\u017C\u0105cej sesji \u0142adowania w watogodzinach. Dla pozosta\u0142ych typ\u00F3w pomiaru zliczana jest warto\u015B\u0107 \u015Brednia w okresie 15 minut.
statistic_type_other=Dla pomiaru warto\u015Bci \u015Bredniej zliczana jest warto\u015B\u0107 \u015Brednia w okresie 15 minut. Dla licznika impuls\u00F3w statystyki s\u0105 wysy\u0142ane na podstawie zliczania impuls\u00F3w za pomoc\u0105 metody TriggerPulse, w\u00F3wczas warto\u015B\u0107 Value przedstawia aktualn\u0105 warto\u015B\u0107 do wys\u0142ania na serwer.
statistic_subtype_grid=Podkategoria pomiaru. Mo\u017Ce by\u0107 to pomiar og\u00F3lny lub konkretna faza L1, L2 lub L3.
