statistic_state=W\u0142\u0105cza raportowanie pomiaru do statystyk oraz definiuje kategori\u0119 pomiaru.\n\nUwaga!\nRaz wys\u0142ana statystyka pozostaje w historii statystyk na serwerze.\nMo\u017Cliwe jest manualne usuni\u0119cie statystyk z poziomu panelu konta w chmurze.\n\nOff - Statystyki nie s\u0105 wysy\u0142ane do chmury.
statistic_state_pulse=W\u0142\u0105cza raportowanie pomiaru do statystyk oraz definiuje kategori\u0119 pomiaru.\n\nUwaga!\nRaz wys\u0142ana statystyka pozostaje w historii statystyk na serwerze.\nMo\u017Cliwe jest manualne usuni\u0119cie statystyk z poziomu panelu konta w chmurze.\n\nOff - Statystyki nie s\u0105 wysy\u0142ane do chmury.
