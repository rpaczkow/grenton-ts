statistic_value=Warto\u015B\u0107 pomiarowa obliczana i wysy\u0142ana jako statystyka do serwera co pe\u0142ne 15 minut.\n Dla pomiar\u00F3w 'Media' \u2013 ustaw warto\u015B\u0107 w zakresie od 0.0 do 1.0 (zu\u017Cycie energii zostanie obliczone automatycznie na podstawie cechy Load).\nDla pomiar\u00F3w 'Sensor', 'Battery Level', 'Voltage', 'Power', 'Reactive Power' i 'Other Average Value' \u2013 ustaw aktualn\u0105 warto\u015B\u0107 (warto\u015B\u0107 \u015Brednia zostanie obliczona automatycznie).\nDla pomiar\u00F3w 'Energy' \u2013 ustaw aktualn\u0105 ca\u0142kowit\u0105 warto\u015B\u0107 energii w watogodzinach (r\u00F3\u017Cnica zostanie obliczona automatycznie).
statistic_pulse_value=Warto\u015B\u0107 pomiarowa obliczana i wysy\u0142ana jako statystyka do serwera co pe\u0142ne 15 minut.\nU\u017Cyj metody TriggerPulse aby doda\u0107 kolejn\u0105 warto\u015B\u0107 do pomiaru. Dla pomiar\u00F3w 'Media' \u2013 do licznika zostanie dodana warto\u015B\u0107 cechy Load.\nPo wys\u0142aniu warto\u015Bci na serwer, licznik jest resetowany.
