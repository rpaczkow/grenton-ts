statistic_value=Der Messwert wird alle 15 Minuten als Statistik an den Server gesendet.\nF\u00FCr die 'Media'-Messung \u2013 setzen Sie den Wert im Bereich von 0,0 bis 1,0 (der Energieverbrauch wird automatisch auf Grundlage des Lastwertes berechnet).\nF\u00FCr die Messungen 'Sensor', 'Batteriestand', 'Spannung', 'Leistung', 'Reaktive Leistung' und 'Andere Durchschnittswerte' \u2013 setzen Sie den aktuellen Wert (der Durchschnittswert wird automatisch berechnet).\nF\u00FCr die 'Energie'-Messungen \u2013 setzen Sie den aktuellen Gesamtenergieverbrauch in Wattstunden (die Differenz wird automatisch berechnet).
statistic_pulse_value=Der Messwert wird alle 15 Minuten als Statistik an den Server gesendet.\nVerwenden Sie die Methode TriggerPulse, um einen weiteren Wert zur Messung hinzuzuf\u00FCgen. F\u00FCr 'Media'-Messungen wird der Wert der Load-Eigenschaft zum Z\u00E4hler hinzugef\u00FCgt.\nNach dem Senden des Wertes an den Server wird der Z\u00E4hler zur\u00FCckgesetzt.
