statistic_type_media_pulse=Statistiken werden basierend auf der Z\u00E4hlung der Impulse mit der TriggerPulse-Methode und dem erkl\u00E4rten Wert f\u00FCr einen Impuls in Watt oder m\u00B3 gesendet. Der Wert von Value stellt den aktuellen Wert dar, der an den Server gesendet werden soll.
statistic_type_sensor=Statistiken werden basierend auf der Berechnung des Durchschnittswerts f\u00FCr den eingestellten Wert des Attributs Value \u00FCber einen Zeitraum von 15 Minuten gesendet.
statistic_type_grid=F\u00FCr die Energiemessung werden Statistiken basierend auf der Z\u00E4hlung der Differenz des Attributs Value \u00FCber einen Zeitraum von 15 Minuten gesendet. Das Attribut Value muss mit dem Gesamtenergieverbrauch in Wattstunden aktualisiert werden. F\u00FCr andere Messarten wird der Durchschnittswert \u00FCber 15 Minuten berechnet.
statistic_type_energyproduction=F\u00FCr die Energiemessung werden Statistiken basierend auf der Z\u00E4hlung der Differenz des Attributs Value \u00FCber einen Zeitraum von 15 Minuten gesendet. Das Attribut Value muss mit dem Gesamtenergieverbrauch in Wattstunden aktualisiert werden. F\u00FCr andere Messarten wird der Durchschnittswert \u00FCber 15 Minuten berechnet.
statistic_type_energystorage=F\u00FCr die Messung des Ladezustands wird der Durchschnittswert \u00FCber einen Zeitraum von 15 Minuten berechnet. F\u00FCr die Messung des Lade- und Entladeenergiewerts werden Statistiken basierend auf der Z\u00E4hlung der Differenz des Attributs Value \u00FCber einen Zeitraum von 15 Minuten gesendet. Das Attribut Value muss mit dem Gesamtenergieverbrauch in Wattstunden aktualisiert werden.
statistic_type_charger=F\u00FCr die Energiemessung werden Statistiken basierend auf der Z\u00E4hlung der Differenz des Attributs Value \u00FCber einen Zeitraum von 15 Minuten gesendet. Das Attribut Value muss mit dem Gesamtwert der aktuellen Ladesitzung in Wattstunden aktualisiert werden. F\u00FCr andere Messarten wird der Durchschnittswert \u00FCber 15 Minuten berechnet.
statistic_type_other=F\u00FCr die Durchschnittswertmessung wird der Durchschnittswert \u00FCber einen Zeitraum von 15 Minuten berechnet. F\u00FCr den Impulsz\u00E4hler werden Statistiken basierend auf der Z\u00E4hlung der Impulse mit der TriggerPulse-Methode gesendet, wobei der Wert von Value den aktuellen Wert darstellt, der an den Server gesendet werden soll.
