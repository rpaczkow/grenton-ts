statistic_state=Aktiviert die Messberichterstattung im Statistikmodul und definiert die Messkategorie.\n\nHinweis!\nEinmal gesendete Statistiken bleiben in der Statistikhistorie auf dem Server.\nEs ist m\u00F6glich, Statistiken manuell \u00FCber das Cloud-Kontopanels zu l\u00F6schen.\n\nOff - Statistiken werden nicht in die Cloud gesendet.
statistic_state_pulse=Aktiviert die Messberichterstattung im Statistikmodul und definiert die Messkategorie.\n\nHinweis!\nEinmal gesendete Statistiken bleiben in der Statistikhistorie auf dem Server.\nEs ist m\u00F6glich, Statistiken manuell \u00FCber das Cloud-Kontopanels zu l\u00F6schen.\n\nOff - Statistiken werden nicht in die Cloud gesendet.
