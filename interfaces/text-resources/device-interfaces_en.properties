statistic_state=Enables measurement reporting to the statistics and defines the measurement category.\n\nWarning!\nOnce a statistic is sent, it remains in the statistics history on the server.\nIt is possible to manually delete statistics from the cloud account panel.\n\nOff - Statistics are not sent to the cloud.
statistic_state_pulse=Enables measurement reporting to the statistics and defines the measurement category.\n\nWarning!\nOnce a statistic is sent, it remains in the statistics history on the server.\nIt is possible to manually delete statistics from the cloud account panel.\n\nOff - Statistics are not sent to the cloud.
statistic_state_enum_off=Off
statistic_state_enum_continous=Media
statistic_state_enum_pulse=Media
statistic_state_enum_sensor=Sensor
statistic_state_enum_grid=Grid
statistic_state_enum_production=Energy Production
statistic_state_enum_battery=Energy Storage
statistic_state_enum_charger=Charger
statistic_state_enum_other=Other (Average value)
statistic_state_enum_other_counter=Other (Counter)
statistic_type_media_pulse=Statistics are sent based on pulse counting using the TriggerPulse method, and the declared value for one pulse expressed in watts or m\u00B3. The Value represents the current value to be sent to the server.
statistic_type_sensor=Statistics are sent based on the calculation of the average value of the Value feature over a 15-minute period.
statistic_type_grid=For energy measurement, statistics are sent based on the difference in the Value feature over a 15-minute period. The Value feature should be updated with the total energy value in watt-hours. For other measurement types, the average value over a 15-minute period is calculated.
statistic_type_energyproduction=For energy measurement, statistics are sent based on the difference in the Value feature over a 15-minute period. The Value feature should be updated with the total energy value in watt-hours. For other measurement types, the average value over a 15-minute period is calculated.
statistic_type_energystorage=For charge level measurement, the average value over a 15-minute period is calculated. For charging and discharging energy measurement, statistics are sent based on the difference in the Value feature over a 15-minute period. The Value feature should be updated with the total energy value in watt-hours.
statistic_type_charger=For energy measurement, statistics are sent based on the difference in the Value feature over a 15-minute period. The Value feature should be updated with the total energy value of the current charging session in watt-hours. For other measurement types, the average value over a 15-minute period is calculated.
statistic_type_other=For average value measurement, the average value over a 15-minute period is calculated. For pulse counters, statistics are sent based on pulse counting using the TriggerPulse method, where the Value represents the current value to be sent to the server.
statistic_subtype_grid=Measurement subcategory. It can be a general measurement or a specific phase: L1, L2, or L3.
