statistic_value=The measurement value is calculated and sent as a statistic to the server every full 15 minutes.\nFor 'Media' measurement \u2013 set the value within the range of 0.0 to 1.0 (the energy consumption will be automatically calculated based on the Load value).\nFor 'Sensor', 'Battery Level', 'Voltage', 'Power', 'Reactive Power' and 'Other Average Value' measurements \u2013 set the current value (the average value will be calculated automatically).\nFor 'Energy' measurements \u2013 set the current total energy value in watt-hours (the difference will be calculated automatically).
statistic_pulse_value=The measurement value is calculated and sent as a statistic to the server every full 15 minutes.\nUse the TriggerPulse method to add another value to the measurement. For 'Media' measurement \u2013 the Load feature value will be added to the counter.\nAfter sending the value to the server, the counter is reset.
