statistic_load_pulse=Valore per impulso in watt o metri cubi.
statistic_setvalue=Imposta il valore dell'attributo Value.
statistic_triggerpulse=Attiva un impulso per il tipo di misurazione Pulse o per il contatore degli impulsi.
statistic_onpulsetriggered=Evento attivato dopo l'attivazione di un impulso.
statistic_onvaluechange=Evento attivato dopo la modifica del valore dell'attributo Value.
statistic_onstatisticssend=Evento attivato dopo l'invio delle statistiche al server.
statistic_value=Il valore di misurazione viene calcolato e inviato come statistica al server ogni 15 minuti.\nPer la misurazione 'Media' \u2013 impostare il valore nell'intervallo da 0,0 a 1,0 (il consumo energetico verr\u00E0 calcolato automaticamente in base al valore del carico).\nPer le misurazioni 'Sensor', 'Battery Level', 'Voltage', 'Power', 'Reactive Power' e 'Other Average Value' \u2013 impostare il valore corrente (il valore medio verr\u00E0 calcolato automaticamente).\nPer le misurazioni 'Energy' \u2013 impostare il valore totale corrente dell'energia in wattora (la differenza verr\u00E0 calcolata automaticamente).
statistic_pulse_value=Il valore di misurazione viene calcolato e inviato come statistica al server ogni 15 minuti.\nUsa il metodo TriggerPulse per aggiungere un altro valore alla misurazione. Per le misurazioni 'Media' \u2013 al contatore verr\u00E0 aggiunto il valore della propriet\u00E0 Load.\nDopo l'invio del valore al server, il contatore viene azzerato.