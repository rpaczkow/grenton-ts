statistic_state=Abilita la reportistica delle misurazioni al modulo di statistiche e definisce la categoria di misurazione.\n\nAttenzione!\nUna statistica inviata rimane nella cronologia delle statistiche sul server.\n\u00C8 possibile rimuovere manualmente le statistiche tramite il pannello dell'account nel cloud.\n\nOff - Le statistiche non vengono inviate al cloud.
statistic_state_pulse=Abilita la reportistica delle misurazioni al modulo di statistiche e definisce la categoria di misurazione.\n\nAttenzione!\nUna statistica inviata rimane nella cronologia delle statistiche sul server.\n\u00C8 possibile rimuovere manualmente le statistiche tramite il pannello dell'account nel cloud.\n\nOff - Le statistiche non vengono inviate al cloud.
statistic_state_enum_off=Off
statistic_state_enum_continous=Media
statistic_state_enum_pulse=Media
statistic_state_enum_sensor=Sensor
statistic_state_enum_grid=Grid
statistic_state_enum_production=Energy Production
statistic_state_enum_battery=Energy Storage
statistic_state_enum_charger=Charger
statistic_state_enum_other=Other (Average value)
statistic_state_enum_other_counter=Other (Counter)
statistic_type_media_pulse=Le statistiche vengono inviate in base al conteggio degli impulsi tramite il metodo TriggerPulse, e al valore dichiarato per un singolo impulso espresso in watt o m\u00B3. Il valore di Value rappresenta il valore attuale da inviare al server.
statistic_type_sensor=Le statistiche vengono inviate in base al calcolo del valore medio per il valore impostato dell'attributo Value in un periodo di 15 minuti.
statistic_type_grid=Per la misurazione dell'energia, le statistiche vengono inviate in base al conteggio della differenza del valore dell'attributo Value in un periodo di 15 minuti. L'attributo Value deve essere aggiornato con il valore totale dell'energia in wattora. Per gli altri tipi di misurazione, viene calcolato il valore medio in un periodo di 15 minuti.
statistic_type_energyproduction=Per la misurazione dell'energia, le statistiche vengono inviate in base al conteggio della differenza del valore dell'attributo Value in un periodo di 15 minuti. L'attributo Value deve essere aggiornato con il valore totale dell'energia in wattora. Per gli altri tipi di misurazione, viene calcolato il valore medio in un periodo di 15 minuti.
statistic_type_energystorage=Per la misurazione dello stato di carica, viene calcolato il valore medio in un periodo di 15 minuti. Per la misurazione dell'energia di carica e scarica, le statistiche vengono inviate in base al conteggio della differenza del valore dell'attributo Value in un periodo di 15 minuti. L'attributo Value deve essere aggiornato con il valore totale dell'energia in wattora.
statistic_type_charger=Per la misurazione dell'energia, le statistiche vengono inviate in base al conteggio della differenza del valore dell'attributo Value in un periodo di 15 minuti. L'attributo Value deve essere aggiornato con il valore totale dell'energia della sessione di carica corrente in wattora. Per gli altri tipi di misurazione, viene calcolato il valore medio in un periodo di 15 minuti.
statistic_type_other=Per la misurazione del valore medio, viene calcolato il valore medio in un periodo di 15 minuti. Per il contatore degli impulsi, le statistiche vengono inviate in base al conteggio degli impulsi tramite il metodo TriggerPulse, in questo caso il valore di Value rappresenta il valore attuale da inviare al server.
statistic_subtype_grid=Sottocategoria della misurazione. Pu\u00F2 essere una misurazione generale o una fase specifica L1, L2 o L3.
